services:
  # Backend API Service
  - type: web
    name: asmat-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: asmat-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

  # Database
  - type: pg
    name: asmat-db
    databaseName: asmat
    plan: free
